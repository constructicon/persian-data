---
1:
  name: 'پس NP چی (شدن)؟ / پس NP؟'
  name_transcription: 'pas NP či (šod-an) / pas NP'
  name_translation: 'What about NP then?'
  illustration: 'پس [نظر جمع]چی می‌شه؟'
  illustration_transcription: 'pas [nazare jam] či miše?'
  cefr_level: 
  definitions:
    - persian: |
         'این ساخت [موضوعی]Theme را برجسته می‌کند که مخاطب آن را در تصمیم نهایی خود لحاظ نکرده است. این عدم توجه می‌تواند به صورت ناخودآگاه یا عمدی باشد.'
    - english: |
         'This construction highlights a [topic]Theme that the addressee has not considered in their final decision. This inconsideration can be either intentional or unintentional.'
  examples:
    - example: 'من دیگه میخوام طلاق بگیرم! گفت پس [سوگل]Theme چی می‌شه این وسط؟'
      transcription: 'man dige mixām talāq begiram! goft pas [sogol]Theme či miše?'
    - example: 'پس [قول و قرارمون]Theme چی می‌شه؟ همشو یادت رفت؟'
      transcription: 'pas [qol o qarāremun]Theme či miše? hamašo yādet raft?'
    - example: 'با گریه گفت پس [خانواده من]Theme چه می‌شود؟'
      transcription: 'bā gerye goft pas [xānevādeye man]Theme če mišavad?'
    - example: 'گفتم آخه تنهام. گفت پس [من]Theme چی رفیق؟'
      transcription: 'goftam āxe man tanhām. goft pas [man]Theme či rafiq?'
    - example: 'مگه من جلبکم؟ پس [من]Theme چی؟'
      transcription: 'mage man jolbakam? pas [man]Theme či?'
  morphology:
    - NP
  syntactic_type_of_construction:
    - Clause
  syntactic_function_of_anchor:
    - Verb Predicate
  syntactic_structure_of_anchor:
    - Light Verb Construction
  part_of_speech_of_anchor:
    - Noun
    - Pronoun
    - Verb
  semantic_roles:
    - Theme
  intonation:
    - Declarative
  usage_label:
    - Formal
  comment: 
    - Persian: |
        'بسط استعاری از همین ساخت به معنی "لمس کردن"'
    - English: |
        'A metaphorical extension of the same construction that means "to touch something".'
  common_fillers:
    - ~
  semantic_types:
  family:
    - |
      ""
2:
  name: 'دست به NP زدن'
  name_transcription: 'dast be NP zad-an'
  name_translation: 'Commit NP / Begin doing NP'
  illustration: 'فرد زندانی دست به [خودکشی]زده است.'
  illustration_transcription: 'farde zendāni dast be [xodkoši] zade ast.'
  cefr_level: 
  definitions:
    - persian: |
         'ساختی خبری که بیان می‌کند شخص، گروه یا موجودی مشخص، شروع به انجام [فعالیت]Theme خاصی می‌کند. این فعالیت گاهاً ناگهانی و غیرمنتظره است.'
    - english: |
         'A declarative construction which states that an entity starts doing an [activity]Theme. It is sometimes a sudden action against the expectations.'
  examples:
    - example: 'اصولاً انسان‌ها در مواقعی که ضرورت ایجاد کند دست به [کارهای بزرگی]Theme می‌زنند.'
      transcription: 'osulan ensānhā dar mavāqei ke zarurat ijād konad dast be [kārhāye bozorgi] mizanand.'
    - example: 'من به این خاطر دست به [فعالیت سیاسی]Theme زدم که از خانواده قربانیان هستم.'
      transcription: 'man be in xāter dast be faāliate siyāsi zadam ke az xānevādeye qorbāniān hastam.'
    - example: 'یک زن برای رهایی از اذیت و آزارهای همسرش دست به [قتل او]Theme زد.'
      transcription: 'yek zan barāye rahāyi az aziat va āzārhāye hamsaraš dast be [qatle u] zad.'
    - example: 'در ماه اوریل پیونگ یانگ دست به [انجام یک ازمایش موشکی]Theme زد که نگرانی‌های فراوانی را به همراه داشت.'
      transcription: 'dar māhe āvril piyong yāng dast be [anjāme yek āzmāyeše mušaki] zad ke negaranihāye farāvāni rā be hamrāh dāšt.'
    - example: 'در روز چهارشنبه پنجاه هزار تن در سانتیاگو ، پایتخت ، دست به [راهپیمایی]patient زدند.'
      transcription: 'dar ruze čahāršanbe panjāh hezār tan dar sāntiāgo pāytaxt, dast be [rāhpeymāyi] zadand.'
  morphology:
    - NP
  syntactic_type_of_construction:
    - Copula Construction
  syntactic_function_of_anchor:
    - ~
  syntactic_structure_of_anchor:
    - ~
  part_of_speech_of_anchor:
