1:
  name: 'دست به NP زدن'
  name_transcription: 'dæst be NP zædæn'
  name-translation: 'begin doing NP, commit NP'
  UD_name: 'دست به NP زدن'
  illustration: 'فرد زندانی دست به خودکشی زده است.'
  illustration_transcription: 'færde zendani dæst be xodkoʃi zæde ʔæst.'
  cefr_level: Not available
  definitions:
    - persian: |
        این ساخت خبری، بیان می‌کند که شخص، گروه یا موجود مشخصی شروع به انجام [فعالیت]Theme خاصی می‌کند. این فعالیت گاهاً ناگهانی و غیرمنتظره است.
    - english: |
         This declarative construction states that an entity starts doing an [activity]Theme. It is sometimes a sudden action against the expectations.
    - norwegian: |
         Not available.
  examples:
    - |
         اصولاً انسان‌ها در مواقعی که ضرورت ایجاد کند دست به [کارهای بزرگی]Theme می‌زنند.       
    - |
         من به این خاطر دست به [فعالیت سیاسی]Theme زدم که از خانواده قربانیان کشتار زندان ابوسلیم هستم.
    - |
         بنا بر اعلام پلیس پاکستان، یک زن برای رهایی از اذیت و آزارهای همسرش دست به [قتل او]Theme زد.
    - |
         در ماه اوریل پیونگ یانگ دست به [انجام یک ازمایش موشکی]Theme زد که نگرانی‌ها و انتقادات فراوانی را به همراه داشت.
    - |
         در روز چهارشنبه پنجاه هزار تن در سانتیاگو ، پایتخت ، دست به [راهپیمایی]patient زدند.
  examples_transcriptions:
    - |
         ʔosulæn ʔensanha dær mævaqei ke zæruræt ʔidʒad konæd dæst be [karhaye bozorɡi] mizænænd.
    - |
         mæn be ʔin xater dæst be fæʔʔaliæte siasi zædæm ke ʔæz xanevadeye qorbaniane koʃtare ʔæbusælim hæstam.
    - |
         bæna bær ʔeʔlame polise pakestan, yek zæn bæraye ræhayi ʔæz ʔæziæt væ ʔazarhaye hæmsæræʃ dæst be [qætle ʔu] zæd.
    - |
         dær mahe ʔavril piyonɡ yanɡ dæst be [ʔændʒame yek ʔazmayeʃe muʃæki] zæd ke neɡæraniha væ ʔenteqadate færavani ra be hæmrah daʃt.
    - |
         dær ruze tʃaharʃæmbe pændʒah hezar tæn dær santiaɡo, paytæxt, dæst be [rahpeymayi] zædænd.
