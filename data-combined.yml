2:
  name: 'پس NP چی (می‌شه) / پس NP چه می‌شود؟ / پس NP؟'
  name_transcription: 'pas NP chi (shodan) / pas NP?'
  name-translation: 'What about NP then?'
  UD_name: 'پس NP چی (می‌شه) / پس NP چه می‌شود؟ / پس NP؟'
  illustration: 'پس نظر جمع چی می‌شه؟'
  illustration_transcription: 'pas nazar-e jam’ chi mi-sheh?'
  cefr_level: Not available
  definitions:
    - persian: |
        این ساخت [موضوعی]Theme را برجسته می‌کند که مخاطب آن را در تصمیم نهایی خود لحاظ نکرده است. این عدم توجه می‌تواند به صورت ناخودآگاه یا عمدی باشد.
    - english: |
         This construction highlights a [topic]Theme that the addressee has not considered in their final decision. This inconsideration can be either intentional or unintentional.
    - norwegian: |
         Not available.
  examples:
    - |
         من دیگه میخوام طلاق بگیرم! گفتم پس [سوگل]Theme چی می‌شه این وسط؟    
    - |
         پس [قول و قرارمون]Theme چی می‌شه؟ همشو یادت رفت؟
    - |
         با گریه گفت پس [خانواده من]Theme چه می‌شود؟
    - |
         گفتم آخه تنهام. گفت پس [من]Theme چی رفیق؟
    - |
         مگه من جلبکم؟ پس [من]Theme چی؟
  examples_transcriptions:
    - |
         man digeh mi-kham talāgh be-gir-am! goft-am pas [sogol]Theme chi mi-sheh?
    - |
         pas [ghol-o gharār-emun]Theme chi mi-sheh? hama-sh-o yād-et raft?
    - |
         bā gerye goft pas [khānevāde-ye man]Theme cheh mi-shavad?
    - |
         goft-am akheh man tanhām. goft pas [man]Theme chi rafigh?
    - |
         mageh man jolbak-am? pas [man]Theme chi?
