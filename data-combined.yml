4:
  name: 'از این گذشته، CL'
  name_transcription: 'az in gozašte, CL'
  name_translation: 'Furthermore, CL'
  illustration: 'از این گذشته، [موتور هوا را هم آلوده می‌کند]CL.'
  illustration_transcription: 'az in gozašte, [motor havā rā ham ālude mi-kon-ad].'
  cefr_level: 
  definitions:
    - persian: |
         'این ساخت موضوع جدیدی را در تکمیل آنچه پیش از این گفته شده وارد گفتمان می‌کند.'
    - english: |
         'This construction introduces a new topic as added information for what has already been said.'
  examples:
    - example: 'ویتامین A برای سلامت پوست ضروری است. از این گذشته، [این ویتامین برای بینایی نیز مفید است]Argument.'
      transcription: 'vitāmin-e A barāy-e salāmat-e pust zaruri ast. az in gozašte, [in vitāmin barāy-e bināyi niz mofid ast]Argument.'
    - example: 'احساس خوبی در مورد خودتان پیدا می‌کنید. از این گذشته [لبخند زدن باعث ازاد شدن اندروفین در بدن می‌شود]Argument.'
      transcription: 'ehsās-e xub-i dar mored-e xod-etān peydā mi-kon-id. az in gozašte, [labxand zad-an bāes-e āzād šod-an-e endorfin dar badan mi-šav-ad]Argument.'
    - example: 'از این گذشته، [شاید او مایل به انتقال دانش خود به ما نباشد]Argument.'
      transcription: 'az in gozašte, [šāyad u māyel be enteqāl-e dāneš-e xod be mā na-bāš-ad]Argument.'
    - example: 'پاهام درد می‌کنه و نمی‌تونم راه برم. از اینها گذشته، [خودم هم حالم خوب نیست]Argument.'
      transcription: 'pā-hā-m dard mi-kon-e va ne-mi-tun-am rāh be-r-am. az in-hā gozašte, [xod-am ham hāl-am xub nist]Argument.'
    - example: 'چطور می‌توانستم باور کنم که او نمی‌تواند بشنود. از این گذشته، [یک گوش برای شنیدن کافی است]Argument.'
      transcription: 'četor mi-tavān-est-am bāvar kon-am ke u ne-mi-tavān-ad be-šnav-ad. az in gozašte, [yek guš barāy-e šenid-an kāfi ast]Argument.'
  morphology:
    - ~
  syntactic_type_of_construction:
    - ~
  syntactic_function_of_anchor:
    - ~
  syntactic_structure_of_anchor:
    - ~
  part_of_speech_of_anchor:
    - Preposition
    - Determiner
    - Adjective
  semantic_roles:
    - ~
  intonation:
    - ~
  usage_label:
    - Formal
  comment: 
    - Persian: |
        'همچنین به صورت «از اینها گذشته»، «گذشته از این» یا «گذشته از اینها».'
    - English: |
        'Also used as «az in-hā gozašte», «gozašte az in» or «gozašte az in-hā».'
