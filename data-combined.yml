4:
  name: 'از این گذشته، CL'
  name_transcription: 'az in gozašte, CL'
  name_translation: 'Furthermore, CL'
  illustration: 'از این گذشته، [موتور هوا را هم آلوده می‌کند].'
  illustration_transcription: 'az in gozašte, [motor havā rā ham ālude mikonad].'
  cefr_level: 
  definitions:
    - persian: |
         'این ساخت موضوع جدیدی را در تکمیل آنچه پیش از این گفته شده وارد گفتمان می‌کند.'
    - english: |
         'This construction introduces a new topic as added information for what has already been said.'
  examples:
    - example: 'ویتامین A برای سلامت پوست ضروری است. از این گذشته، [این ویتامین برای بینایی نیز مفید است]Argument.'
      transcription: 'vitāmine A barāye salāmate pust zaruri ast. az in gozašte, [in vitāmin barāye bināyi niz mofid ast]Argument.'
    - example: 'احساس خوبی در مورد خودتان پیدا می‌کنید. از این گذشته [لبخند زدن باعث ازاد شدن اندروفین در بدن می‌شود]Argument.'
      transcription: 'ehsāse xubi dar morede xodetān peydā mikonid. az in gozašte, [labxand zadan bāese āzād šodane endorfin dar badan mišavad]Argument.'
    - example: 'از این گذشته، [شاید او مایل به انتقال دانش خود به ما نباشد]Argument.'
      transcription: 'az in gozašte, [šāyad u māyel be enteqāle dāneše xod be mā nabāšad]Argument.'
    - example: 'پاهام درد می‌کنه و نمی‌تونم راه برم. از اینها گذشته، [خودم هم حالم خوب نیست]Argument.'
      transcription: 'pāhām dard mikone va nemitunam rāh beram. az inhā gozašte, [xodam ham hālam xub nist]Argument.'
    - example: 'چطور می‌توانستم باور کنم که او نمی‌تواند بشنود. از این گذشته، [یک گوش برای شنیدن کافی است]Argument.'
      transcription: 'četor mitavānestam bāvar konam ke u nemitavānad bešnavad. az in gozašte, [yek guš barāye šenidan kāfi ast]Argument.'
  morphology:
    - ~
  syntactic_type_of_construction:
    - ~
  syntactic_function_of_anchor:
    - ~
  syntactic_structure_of_anchor:
    - ~
  part_of_speech_of_anchor:
    - Preposition
    - Determiner
    - Adjective
  semantic_roles:
    - ~
  intonation:
    - ~
  usage_label:
    - Formal
  comment: 
    - Persian: |
        'همچنین به صورت «از اینها گذشته»، «گذشته از این» یا «گذشته از اینها».'
    - English: |
        'Also used as «az inhā gozašte», «gozašte az in» or «gozašte az inhā».'
  common_fillers:
