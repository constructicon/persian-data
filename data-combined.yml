8:
  name: 'یک NP هم NEG-VP'
  name_transcription: 'yek NP ham NEG-VP'
  name_translation: 'Not even'
  illustration: 'تیم صبا در نیمه دوم یک [موقعیت] هم [بر روی دروازه ما ایجاد نکرد].'
  illustration_transcription: 'tim-e sabā dar nime-ye dovvom yek [moqeiyat] ham [bar ru-ye darvāze-ye mā ijād na-kard].'
  cefr_level: 
  definitions:
  examples:
