8:
  name: 'یک NP هم NEG-VP'
  name_transcription: 'yek NP ham NEG-VP'
  name_translation: 'Not even'
  illustration: 'تیم صبا در نیمه دوم یک [موقعیت] هم [بر روی دروازه ما ایجاد نکرد].'
  illustration_transcription: 'time sabā dar nimeye dovvom yek [moqeiyat] ham [bar ruye darvāzeye mā ijād nakard].'
  cefr_level: 
  definitions:
  examples:
    - example: 'حتی یک [بار]Role هم [نپرسیدی]Role چرا چشم‌هایت همیشه بارانی است.'
      transcription: 'hattā yek [bār]Role ham [naporsidi]Role cerā češmhāyat hamiše bārāni ast.'
    - example: 'ازش بخواه یک [لحظه]Role هم [فراموشت نکنه]Role و به تو نیرویی بده تا یک [لحظه]Role هم [فراموشش نکنی]Role.'
      transcription: 'azaš bexāh yek [lahze]Role ham [farāmušet nakone]Role va be to niruyi bede tā yek [lahze]Role ham [farāmušeš nakoni]Role.'
